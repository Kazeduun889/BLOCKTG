<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Block Blast</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #fff;
      font-family: Arial, sans-serif;
      text-align: center;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
  </style>
</head>
<body>
  <div id="app">Загрузка...</div>

  <script>
    // Проверяем, загрузился ли SDK
    console.log("Telegram WebApp:", window.Telegram);

    if (window.Telegram?.WebApp) {
      try {
        Telegram.WebApp.ready();
        Telegram.WebApp.expand();
        document.getElementById("app").textContent = "Работает!";
      } catch (e) {
        document.getElementById("app").textContent = "Ошибка: " + e.message;
        console.error(e);
      }
    } else {
      document.getElementById("app").textContent = "SDK не загрузился";
    }
  </script>
</body>
</html>
